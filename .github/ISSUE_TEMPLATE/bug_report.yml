name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Press F5 to start recording
        2. Speak "hello world"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VoiceInput Version
      description: Check the version in the menu bar dropdown
      placeholder: e.g., 1.0.0 (build 153)
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      description: Your macOS version
      placeholder: e.g., macOS 14.0 Sonoma
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If available, paste relevant logs from Menu Bar → "打开日志文件"
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful
